name: secret-scan
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: gitleaks (OSS binary — free, no org license)
        run: |
          VER=8.21.2
          ARCHIVE="gitleaks_${VER}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/${ARCHIVE}"
          echo "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba  $ARCHIVE" \
            | sha256sum --check
          tar -xzf "$ARCHIVE" gitleaks
          ./gitleaks detect --no-git --source . --redact
