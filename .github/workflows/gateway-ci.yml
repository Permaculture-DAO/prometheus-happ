name: gateway-ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gateway-unit:
    # Unit / pure-pipeline + failure-path tests. NOT an end-to-end runtime proof
    # (the live MQTT->conductor proof needs a launcher-managed conductor; see
    # gateway/scripts/e2e_verify.mjs and the ops-docs Raspberry Pi runbook).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: gateway/.nvmrc
      - name: deterministic install (verifies lockfile)
        run: npm ci
        working-directory: gateway
      - name: gateway unit + failure-path tests
        run: npm run smoke
        working-directory: gateway
